<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1A2E5A">
<title>GETEQ – Abwesenheitsmanagement 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1A2E5A;--blue:#0C447C;--accent:#E5820A;--ok:#085041;--warn:#633806;--err:#791F1F;
  --ok-bg:#EAF3DE;--warn-bg:#FAEEDA;--err-bg:#FCEBEB;--info-bg:#E6F1FB;
  --bg:#ececea;--srf:#fff;--bdr:#d8d8d5;--tx:#1a1a1a;--tx2:#888;--tx3:#555;
  --font:Calibri,'Segoe UI',Arial,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh;-webkit-tap-highlight-color:transparent}

/* LOGIN */
#login{position:fixed;inset:0;z-index:9999;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-direction:column}
#login-box{background:#fff;border-radius:14px;padding:36px 32px;width:300px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.45)}
#lpw{width:100%;padding:10px 12px;font-size:15px;border:1.5px solid var(--bdr);border-radius:8px;margin:0 0 10px;font-family:inherit;text-align:center;letter-spacing:.15em}
#lpw:focus{outline:2px solid var(--navy);border-color:var(--navy)}
#lbtn{width:100%;padding:10px;font-size:14px;font-weight:600;border:none;border-radius:8px;background:var(--navy);color:#fff;cursor:pointer}
#lbtn:hover{background:#0e1f3d}
#lerr{color:#E24B4A;font-size:12px;margin-top:8px;min-height:18px}

/* APP */
#app{max-width:1080px;margin:0 auto;padding:14px;padding-bottom:80px}
.hdr{background:var(--navy);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-radius:8px 8px 0 0}
.hdr-l{color:#fff;font-weight:500;font-size:14px}
.hdr-l em{opacity:.55;font-size:11px;margin-left:8px;font-style:normal}
.hdr-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hbtn{font-size:11px;padding:4px 10px;border-radius:5px;background:rgba(255,255,255,.12);color:#B5D4F4;border:1px solid rgba(255,255,255,.2);cursor:pointer;font-family:inherit}
.hbtn:hover{background:rgba(255,255,255,.2)}
.hr-badge{font-size:10px;background:var(--accent);color:#fff;padding:3px 8px;border-radius:10px;font-weight:500}
.save-row{font-size:11px;padding:4px 10px;border-radius:5px;background:rgba(255,255,255,.1);color:#B5D4F4;white-space:nowrap}
.save-row.ok{background:rgba(8,80,65,.5);color:#9FE1CB}
.save-row.err{background:rgba(121,31,31,.5);color:#F8A3A3}

/* NAV */
.nav-bar{background:var(--bg);border:1px solid var(--bdr);border-top:none;display:flex;overflow-x:auto;scrollbar-width:none}
.nav-bar::-webkit-scrollbar{display:none}
.ntab{padding:9px 14px;border:none;border-bottom:2.5px solid transparent;border-radius:0;background:transparent;font-size:12px;font-weight:400;color:var(--tx2);cursor:pointer;white-space:nowrap;font-family:inherit;-webkit-tap-highlight-color:transparent}
.ntab.on{border-bottom-color:var(--navy);font-weight:500;color:var(--navy)}
.ntab:hover{background:#f0f0ee}
.nbadge{background:#E24B4A;color:#fff;border-radius:9px;padding:1px 5px;font-size:9px;margin-left:3px}

/* CONTENT */
#content{background:#fff;border:1px solid var(--bdr);border-top:none;border-radius:0 0 8px 8px;padding:14px}

/* TOAST */
.toast{padding:7px 14px;font-size:12px;border-radius:5px;margin-bottom:12px;display:none}
.toast.show{display:block}
.toast.ok{background:var(--ok-bg);border:1px solid #9FE1CB;color:var(--ok)}
.toast.warn{background:var(--warn-bg);border:1px solid #EF9F27;color:var(--warn)}
.toast.err{background:var(--err-bg);border:1px solid #F09595;color:var(--err)}

/* CARDS / FORMS */
.card{background:#fff;border:1px solid var(--bdr);border-radius:8px;padding:12px 14px}
.row{display:flex;gap:8px;margin-bottom:9px;flex-wrap:wrap}
.row>div{flex:1;min-width:120px}
.lbl{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px}
select,input[type=text],input[type=date],input[type=number],input[type=password]{
  width:100%;padding:7px 10px;border:1px solid var(--bdr);border-radius:6px;
  font-size:13px;font-family:inherit;background:#fff;color:var(--tx)}
select:focus,input:focus{outline:2px solid var(--navy);outline-offset:1px;border-color:var(--navy)}
textarea{width:100%;padding:7px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:12px;font-family:inherit;resize:vertical}
button{font-family:inherit;cursor:pointer;font-size:13px}
.btn{padding:7px 14px;border-radius:6px;border:1px solid var(--bdr);background:#fff;color:var(--tx)}
.btn:hover:not(:disabled){background:#f0f0ee}
.btn-p{background:var(--navy);color:#fff;border:none}.btn-p:hover{background:#0e1f3d}
.btn-ok{background:var(--ok);color:#fff;border:none}.btn-ok:hover{opacity:.9}
.btn-err{background:#A32D2D;color:#fff;border:none}.btn-err:hover{opacity:.9}
.btn-sm{padding:4px 10px;font-size:11px}
button:disabled{opacity:.4;cursor:default}

/* TABLES */
table{width:100%;border-collapse:collapse}
th{font-size:11px;color:var(--tx2);font-weight:500;padding:5px 8px;text-align:left;border-bottom:1px solid var(--bdr)}
td{padding:6px 8px;border-bottom:1px solid #f0f0ee;font-size:12px;vertical-align:middle}
tr:nth-child(even)>td{background:#fafaf8}
tr:hover>td{background:#f5f3ee}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;white-space:nowrap}

/* STAT CARDS */
.stat{background:var(--bg);border-radius:8px;padding:10px 12px;flex:1;min-width:110px}

/* PROGRESS BAR */
.pbar-bg{flex:1;height:8px;background:var(--bdr);border-radius:4px;overflow:hidden;min-width:70px}
.pbar{height:8px;border-radius:4px}

/* WEEK GRID */
.wk-outer{border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.wk-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.wk-nav button{font-size:11px;padding:4px 10px;background:var(--bg);border-color:var(--bdr);color:var(--tx3);border-radius:5px;border:1px solid var(--bdr)}
.wk-head{text-align:center;font-size:10px;font-weight:600;color:var(--tx2);padding:4px 2px}
.wk-head.today{color:var(--blue);background:var(--info-bg);border-radius:5px}
.wk-name{font-size:11px;padding:5px 6px;display:flex;align-items:center;color:var(--tx3);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wk-cell{border-radius:5px;padding:4px 2px;text-align:center;font-size:9px;font-weight:600;cursor:default}
.wk-url{background:var(--info-bg);color:var(--blue)}
.wk-ab{background:var(--warn-bg);color:var(--warn)}
.wk-fort{background:#FAECE7;color:#712B13}
.wk-son{background:#EEEDFE;color:#3C3489}
.wk-bild{background:var(--ok-bg);color:var(--ok)}
.wk-krank{background:var(--err-bg);color:var(--err)}
.wk-frei{background:#FBEAF0;color:#72243E}
.wk-empty{background:var(--bg)}
.wk-empty.today{background:#EEF6FF}
.wk-holiday{background:#f0f0ee;color:#aaa}
.wk-legend{margin-top:10px;padding-top:8px;border-top:1px solid #f0f0ee;font-size:10px;color:#bbb;display:flex;gap:8px;flex-wrap:wrap}
.wk-pill{padding:1px 6px;border-radius:3px;font-weight:600}

/* JAHRES-KALENDER */
.jk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media (max-width:700px){.jk-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:450px){.jk-grid{grid-template-columns:1fr}}
.jk-month{border:1px solid var(--bdr);border-radius:8px;padding:8px 6px;background:#fff}
.jk-mtitle{font-size:12px;font-weight:600;color:var(--navy);text-align:center;margin-bottom:5px}
.jk-drow{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:1px}
.jk-dn{text-align:center;font-size:8px;font-weight:600;color:#aaa;padding:1px 0}
.jk-dn.we{color:#C94040}
.jk-day{text-align:center;font-size:10px;padding:3px 0;border-radius:3px;background:transparent;color:#333;border:1px solid transparent;cursor:default}
.jk-day.out{background:transparent;color:transparent}
.jk-day.we{color:#C94040}
.jk-day.ft{background:#FEF3C7;color:#92400E;border-color:#FCD34D}
.jk-day.url{background:#1A2E5A;color:#fff;font-weight:600}
.jk-day.urlp{background:#7A9CD4;color:#fff}
.jk-day.krank{background:#FCEBEB;color:#791F1F;font-weight:600}
.jk-day.bild{background:#D1FAE5;color:#065F46;font-weight:600}
.jk-day.fort{background:#FAECE7;color:#712B13;font-weight:600}
.jk-day.son{background:#EEEDFE;color:#3C3489;font-weight:600}
.jk-day.ab{background:#FAEEDA;color:#633806;font-weight:600}
.jk-day.today{outline:1.5px solid var(--navy);outline-offset:-1px}
.jk-ft{font-size:9px;color:#92400E;margin-top:4px;border-top:1px solid #f0f0ee;padding-top:3px;line-height:1.4}
.jk-key{display:inline-block;width:12px;height:12px;border-radius:2px;vertical-align:middle;margin-right:2px}
.jk-key.url{background:#1A2E5A}
.jk-key.urlp{background:#7A9CD4}
.jk-key.krank{background:#FCEBEB;border:1px solid #F0A4A4}
.jk-key.bild{background:#D1FAE5;border:1px solid #86E3B5}
.jk-key.fort{background:#FAECE7;border:1px solid #E8B7A6}
.jk-key.son{background:#EEEDFE;border:1px solid #C7C1F5}
.jk-key.ft{background:#FEF3C7;border:1px solid #FCD34D}
.jk-key.we{background:#fff;border:1px solid #d8d8d5;color:#C94040}

/* INFOBOX */
.infobox{background:var(--warn-bg);border:1px solid #EF9F27;border-radius:6px;padding:8px 10px;font-size:11px;color:var(--warn);line-height:1.5;margin-bottom:9px}

/* HR LOCKED */
.hr-locked{text-align:center;background:#fafaf8;border:2px dashed var(--bdr);border-radius:10px;padding:30px 20px}

/* MOBILE */
@media(max-width:600px){
  #app{padding:10px;padding-bottom:70px}
  .row{flex-direction:column}
  .row>div{min-width:0}
  .hdr-r .hbtn:not(.save-row){display:none}
  .wk-name{font-size:9px}
}
.fab{position:fixed;bottom:18px;right:18px;width:50px;height:50px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:22px;box-shadow:0 4px 16px rgba(229,130,10,.4);z-index:80;display:none;align-items:center;justify-content:center;cursor:pointer}
@media(max-width:600px){.fab{display:flex}}
</style>
</head>

function dISO(d){return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
function z(n){return String(n).padStart(2,'0');}
function today(){return dISO(new Date());}
function fmtD(s){if(!s)return'–';var p=s.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function isoWeek(d){
  var dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var dn=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-dn);
  var y0=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil(((dt-y0)/864e5+1)/7);
}
function weekDays(d){
  var day=d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()-(day===0?6:day-1));
  var r=[];for(var i=0;i<5;i++){var x=new Date(mon);x.setDate(mon.getDate()+i);r.push(x);}return r;
}
function netDays(a,b){
  if(!a||!b)return 0;
  var s=new Date(a),e=new Date(b),n=0,d=new Date(s);
  if(s>e)return 0;
  while(d<=e){var ds=dISO(d);if(d.getDay()>0&&d.getDay()<6&&!FEIERTAGE[ds])n++;d.setDate(d.getDate()+1);}
  return n;
}
function getMa(id){return STAMM.find(function(m){return m.id===id;})||{n:id,f:'–',c:'–',ju:0,b:0,ue:0};}
function maName(id){var m=STAMM.find(function(x){return x.id===id;});return m?m.n:id;}
function artStyle(art){
  if(art==='Urlaub')return 'background:'+var2('#E6F1FB')+';color:#0C447C';
  if(art==='Krank')return 'background:#FCEBEB;color:#791F1F';
  if(art==='Bildungsurlaub')return 'background:#D1FAE5;color:#065F46';
  if(art==='Abwesenheit')return 'background:'+var2('#FAEEDA')+';color:#633806';
  if(art==='Fortbildung')return 'background:#FAECE7;color:#712B13';
  if(art==='Sonderurlaub')return 'background:#EEEDFE;color:#3C3489';
  if(art==='Freistellung')return 'background:#FBEAF0;color:#72243E';
  return 'background:#f1efe8;color:#5f5e5a';
}
function artClass(art){

  if(art==='Krank')return 'wk-krank';

function storageOK(){
  try{localStorage.setItem('__gt__','1');var r=localStorage.getItem('__gt__')==='1';localStorage.removeItem('__gt__');return r;}
  catch(e){return false;}
}

function dbSave(){
  var payload={entries:D.entries, nid:D.nid, ts:new Date().toISOString()};
  var json=JSON.stringify(payload);
  // 1. Schreiben
  try{localStorage.setItem(SK,json);}
  catch(e){setSaveStatus('err','⚠ Speicherfehler: '+e.message);return false;}
  // 2. Lesen & Verifikation
  try{
    var check=localStorage.getItem(SK);
    if(!check){setSaveStatus('err','⚠ Verifikation fehlgeschlagen');return false;}
    var parsed=JSON.parse(check);
    if(!Array.isArray(parsed.entries)||parsed.entries.length!==D.entries.length){
      setSaveStatus('err','⚠ Datenlänge stimmt nicht');return false;
    }
  }catch(e){setSaveStatus('err','⚠ Lesefehler: '+e.message);return false;}
  setSaveStatus('ok','✓ Gespeichert ('+D.entries.length+' Einträge)');
  return true;
}

function dbLoad(){
  try{
    var raw=localStorage.getItem(SK);
    var seededFlag=null;
    try{seededFlag=localStorage.getItem(SK+'-seeded');}catch(e){}
    if(!raw){
      // Erster Start: historische Daten aus SEED übernehmen
      D.entries=JSON.parse(JSON.stringify(SEED));
      D.nid=SEED.length+1;
      dbSave();
      try{localStorage.setItem(SK+'-seeded','1');}catch(e){}
      setSaveStatus('ok','Erststart: '+D.entries.length+' historische Einträge geladen');
      setTimeout(function(){setSaveStatus('','');},3000);
      return;
    }
    var p=JSON.parse(raw);
    if(!Array.isArray(p.entries)){console.warn('GETEQ: Ungültiges Format');return;}
    D.entries=p.entries;
    D.nid=p.nid||1;
    // Backup: leere Save-Datei + noch nie geseedet → automatisch nachladen
    if(D.entries.length===0 && !seededFlag && Array.isArray(SEED) && SEED.length>0){
      D.entries=JSON.parse(JSON.stringify(SEED));
      D.nid=SEED.length+1;
      dbSave();
      try{localStorage.setItem(SK+'-seeded','1');}catch(e){}
      setSaveStatus('ok','Historische Daten nachgeladen: '+D.entries.length);
      setTimeout(function(){setSaveStatus('','');},3000);
      return;
    }
    setSaveStatus('ok','Geladen ('+D.entries.length+' Einträge)');
    setTimeout(function(){setSaveStatus('','');},3000);
  }catch(e){
    console.error('GETEQ Load Error:',e);
    setSaveStatus('err','⚠ Ladefehler');
  }
}

function doImportFile(inp){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var p=JSON.parse(e.target.result);
      if(!Array.isArray(p.entries))throw new Error('Feld "entries" fehlt');
      D.entries=p.entries;D.nid=p.nid||D.nid;
      dbSave();render();
      flash('Import: '+p.entries.length+' Einträge geladen ✓','ok');
    }catch(err){flash('Importfehler: '+err.message,'err');}
  };
  r.readAsText(f);
  inp.value='';
}

function exportCSV(){
  var rows=[['Eintrag-ID','Name','MA_ID','Funktion','Gruppe','Art','Von','Bis','Arbeitstage','Genehmigt','Erfasst am','Kommentar']];
  D.entries.forEach(function(e){

    rows.push([e.id,ma.n,e.ma,ma.f,ma.grp==='fest'?'Festangestellt':(ma.grp==='sonst'?'Sonstige/Extern':'—'),e.art,fmtD(e.von),fmtD(e.bis||e.von),e.tage,e.gen||'–',fmtErfCsv(e.erfasstAm),e.kom||'']);
  });
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(';');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='GETEQ_Abwesenheiten_'+today()+'.csv';a.click();
  URL.revokeObjectURL(url);
  flash('CSV-Export gestartet ✓','ok');
}

// ── PERSONALABRECHNUNG: getrennte Exports pro Gruppe (fest/sonst) und Art (AU/Urlaub) ──
// AU = Art "Krank"; Urlaub = Art "Urlaub". Monatsfilter bezieht sich auf das Von-Datum.
function filterForPayroll(grp,art,monthISO){
  return D.entries.filter(function(e){
    var ma=getMa(e.ma);
    if((ma.grp||'')!==grp)return false;
    if(art==='au' && e.art!=='Krank')return false;
    if(art==='urlaub' && e.art!=='Urlaub')return false;
    if(monthISO && e.von.slice(0,7)!==monthISO)return false;
    return true;
  }).sort(function(a,b){return a.ma.localeCompare(b.ma)||a.von.localeCompare(b.von);});
}

function payrollLabel(grp,art){
  return (grp==='fest'?'Festangestellte':'Sonstige MA')+' – '+(art==='au'?'AU (Krank)':'Urlaub');
}

function exportPayrollCSV(grp,art){
  var monthISO=document.getElementById('payroll-month')?document.getElementById('payroll-month').value:'';
  var arr=filterForPayroll(grp,art,monthISO);
  var monthLbl=monthISO?monthISO:'gesamt';
  var head='"GETEQ – '+payrollLabel(grp,art)+' – '+monthLbl+'"\n"Erstellt am";"'+fmtErfCsv(new Date().toISOString())+'"\n"Einträge";"'+arr.length+'"\n\n';
  var cols=(art==='au')
    ? ['Name','MA_ID','Funktion','Von','Bis','Kalendertage','Arbeitstage','Kommentar']
    : ['Name','MA_ID','Funktion','Von','Bis','Arbeitstage','Status','Kommentar'];
  var rows=[cols];
  arr.forEach(function(e){
    var ma=getMa(e.ma);
    var kt=diffCalDays(e.von,e.bis||e.von);
    if(art==='au'){
      rows.push([ma.n,e.ma,ma.f,fmtD(e.von),fmtD(e.bis||e.von),kt,e.tage,e.kom||'']);
    } else {
      rows.push([ma.n,e.ma,ma.f,fmtD(e.von),fmtD(e.bis||e.von),e.tage,e.gen||'–',e.kom||'']);
    }
  });
  // Summenzeile
  if(arr.length){
    var sumT=arr.reduce(function(s,e){return s+((+e.tage)||0);},0);
    if(art==='au'){
      var sumK=arr.reduce(function(s,e){return s+diffCalDays(e.von,e.bis||e.von);},0);
      rows.push(['SUMME','','','','',sumK,sumT,'']);
    } else {
      rows.push(['SUMME','','','','',sumT,'','']);
    }
  }
  var csv=head+rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(';');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;
  a.download='GETEQ_'+(grp==='fest'?'Fest':'Sonst')+'_'+(art==='au'?'AU':'Urlaub')+'_'+monthLbl+'.csv';
  a.click();URL.revokeObjectURL(url);
  flash(payrollLabel(grp,art)+': '+arr.length+' Einträge exportiert ✓','ok');
}

function diffCalDays(a,b){
  if(!a||!b)return 0;
  var s=new Date(a),e=new Date(b);
  if(s>e)return 0;
  return Math.round((e-s)/86400000)+1;
}

function exportPayrollJSON(){
  var monthISO=document.getElementById('payroll-month')?document.getElementById('payroll-month').value:'';
  var monthLbl=monthISO?monthISO:'gesamt';
  var mkList=function(grp,art){
    return filterForPayroll(grp,art,monthISO).map(function(e){
      var ma=getMa(e.ma);
      var obj={eintrag_id:e.id,name:ma.n,ma_id:e.ma,funktion:ma.f,von:e.von,bis:e.bis||e.von,arbeitstage:e.tage,kommentar:e.kom||'',erfasst_am:e.erfasstAm||null};
      if(art==='au'){obj.kalendertage=diffCalDays(e.von,e.bis||e.von);}
      else{obj.genehmigt=e.gen||'–';}
      return obj;
    });
  };
  var payload={
    meta:{
      erstellt_am:new Date().toISOString(),
      zeitraum:monthLbl,
      hinweis:'AU-Meldungen (Krank) für Personalabrechnung. Rückerstattung durch Krankenkassen ab dem 1. Tag.',
      erklaerung_arten:{au:'Arbeitsunfähigkeit / Krankmeldung (Art "Krank")',urlaub:'Erholungsurlaub (Art "Urlaub")'}
    },
    festangestellte:{au:mkList('fest','au'),urlaub:mkList('fest','urlaub')},
    sonstige_ma:{au:mkList('sonst','au'),urlaub:mkList('sonst','urlaub')}
  };
  var json=JSON.stringify(payload,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='GETEQ_Personalabrechnung_'+monthLbl+'.json';a.click();
  URL.revokeObjectURL(url);
  var total=payload.festangestellte.au.length+payload.festangestellte.urlaub.length+payload.sonstige_ma.au.length+payload.sonstige_ma.urlaub.length;
  flash('Personalabrechnung-JSON: '+total+' Einträge exportiert ✓','ok');
}

  }

}

function fmtErf(iso){
  if(!iso)return '–';
  var d=new Date(iso);
  if(isNaN(d.getTime()))return '–';
  return z(d.getDate())+'.'+z(d.getMonth()+1)+'.'+d.getFullYear();
}
function fmtErfCsv(iso){
  if(!iso)return '';
  var d=new Date(iso);
  if(isNaN(d.getTime()))return '';
  return z(d.getDate())+'.'+z(d.getMonth()+1)+'.'+d.getFullYear()+' '+z(d.getHours())+':'+z(d.getMinutes());
}
function applyFilter(entries){
  var f=D.filter;
  return entries.filter(function(e){
    if(f.ma && e.ma!==f.ma)return false;
    if(f.erfVon){
      if(!e.erfasstAm)return false;
      if(e.erfasstAm.slice(0,10)<f.erfVon)return false;
    }
    if(f.erfBis){
      if(!e.erfasstAm)return false;
      if(e.erfasstAm.slice(0,10)>f.erfBis)return false;
    }
    return true;
  });
}
function setFilter(k,v){D.filter[k]=v;renderContent();}
function resetFilter(){D.filter={ma:'',erfVon:'',erfBis:''};renderContent();}

// ─── WOCHENPLAN ───────────────────────────────────────────────────────
function wochenplanHTML(entries,wkD,wkStart,wkEnd,t,compact){
  var kw=isoWeek(wkD[0]);
  var DE=['Mo','Di','Mi','Do','Fr'];
  var cols='160px repeat(5,1fr)';
  if(window.innerWidth<500)cols='110px repeat(5,1fr)';

  // Wer ist diese Woche abwesend?
  var wkMAs=STAMM.filter(function(ma){
    return ma.on&&wkD.some(function(d){
      var ds=dISO(d);
      return entries.some(function(e){return e.ma===ma.id&&e.gen!=='Nein'&&e.von<=ds&&(e.bis||e.von)>=ds;});
    });
  });

  var html='<div class="wk-outer">';
  html+='<div class="wk-nav">';
  html+='<button onclick="G.weekOff('+(D.weekOff-1)+')">← Vorwoche</button>';
  html+='<span style="font-size:12px;font-weight:600;color:'+NAVY+'">KW '+kw+'</span>';
  html+='<span style="font-size:11px;color:#888">'+fmtD(wkStart)+' – '+fmtD(wkEnd)+'</span>';
  html+='<button onclick="G.weekOff('+(D.weekOff+1)+')">Folgewoche →</button>';
  html+='</div>';

  // Header-Zeile
  html+='<div style="display:grid;grid-template-columns:'+cols+';gap:2px;margin-bottom:4px">';
  html+='<div></div>';
  wkD.forEach(function(d,i){
    var ds=dISO(d);
    var isT=ds===t;
    var isFt=!!FEIERTAGE[ds];
    html+='<div class="wk-head'+(isT?' today':'')+'">';
    html+=DE[i]+'<br><span style="font-size:9px;font-weight:400;color:'+(isFt?'#aaa':'inherit')+'">'+fmtD(ds)+(isFt?'*':'')+'</span></div>';
  });
  html+='</div>';

  if(wkMAs.length===0){
    html+='<div style="text-align:center;color:#aaa;padding:20px;font-size:12px">✅ Alle Mitarbeitenden diese Woche anwesend</div>';
  } else {
    wkMAs.forEach(function(ma){
      html+='<div style="display:grid;grid-template-columns:'+cols+';gap:2px;margin-bottom:2px">';
      html+='<div class="wk-name" title="'+ma.f+' · '+ma.id+'">'+ma.n+'<br><span style="font-size:9px;color:#aaa;font-weight:400">'+ma.f+'</span></div>';
      wkD.forEach(function(d){
        var ds=dISO(d);
        var isFt=!!FEIERTAGE[ds];
        if(isFt){html+='<div class="wk-cell wk-holiday" title="'+FEIERTAGE[ds]+'">FT</div>';return;}
        var abs=entries.filter(function(e){return e.ma===ma.id&&e.gen!=='Nein'&&e.von<=ds&&(e.bis||e.von)>=ds;});
        if(abs.length===0){
          html+='<div class="wk-cell wk-empty'+(ds===t?' today':'')+'" title="Anwesend"></div>';
        } else {
          var e=abs[0];
          var short=e.art.slice(0,2);
          html+='<div class="wk-cell '+artClass(e.art)+'" title="'+e.art+(e.tage?' · '+e.tage+'d':'')+'">';
          html+=short+'</div>';
        }
      });
      html+='</div>';
    });
  }

  // Legende
  html+='<div class="wk-legend">';
  [['wk-url','Urlaub'],['wk-krank','Krank'],['wk-bild','Bildungsurlaub'],['wk-fort','Fortbildung'],['wk-ab','Abwesenheit'],['wk-son','Sonderurlaub/Freistellung'],['wk-holiday','Feiertag']].forEach(function(l){
    html+='<span><span class="badge wk-pill '+l[0]+'">'+l[1].slice(0,2)+'</span> '+l[1]+'</span>';
  });
  if(!compact)html+='<span>· * = Berliner Feiertag</span>';
  html+='</div></div>';
  return html;
}

function viewWoche(entries,t){
  var baseD=new Date(Date.now()+D.weekOff*604800000);
  var wkD=weekDays(baseD);
  var wkStart=dISO(wkD[0]),wkEnd=dISO(wkD[4]);
  return wochenplanHTML(entries,wkD,wkStart,wkEnd,t,false);
}

// Zeigt einen Jahres-Urlaubskalender für die ausgewählte Person (12 Monatskacheln)
function jahreskalenderHTML(entries,t){
  var sel=D.konto.selMa;
  var year=D.konto.year||new Date().getFullYear();
  var MNAMES=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  var DNAMES=['Mo','Di','Mi','Do','Fr','Sa','So'];
  var maOpts=STAMM.slice().sort(function(a,b){return a.n.localeCompare(b.n,'de');}).map(function(m){
    return '<option value="'+m.id+'"'+(sel===m.id?' selected':'')+'>'+m.n+(m.on?'':' (ausgeschieden)')+'</option>';
  }).join('');

  var html='<div class="card" style="margin-top:18px;padding:14px">';
  html+='<div style="display:flex;justify-content:space-between;align-items:end;flex-wrap:wrap;gap:10px;margin-bottom:12px">';
  html+='<div style="flex:1;min-width:220px"><label class="lbl">Jahres-Kalender für</label>';
  html+='<select onchange="setKontoMa(this.value)"><option value="">– Person wählen –</option>'+maOpts+'</select></div>';
  html+='<div class="wk-nav" style="margin:0">';
  html+='<button onclick="setKontoYear('+(year-1)+')">← '+(year-1)+'</button>';
  html+='<span style="font-size:14px;font-weight:700;color:'+NAVY+';padding:0 8px">'+year+'</span>';
  html+='<button onclick="setKontoYear('+(year+1)+')">'+(year+1)+' →</button>';
  html+='</div></div>';

  if(!sel){
    html+='<div style="text-align:center;color:#aaa;padding:24px;font-size:12px">Wähle oben eine Person, um den Jahres-Kalender anzuzeigen.</div>';
    html+='</div>';
    return html;
  }

  var ma=getMa(sel);
  // Alle Einträge dieser Person, egal ob genehmigt oder nicht
  var maE=entries.filter(function(e){return e.ma===sel;});

  html+='<div style="font-size:12px;color:#555;margin-bottom:10px"><strong>'+ma.n+'</strong> · '+ma.f+' · '+sel+' · Jahresanspruch '+ma.ju+' Tage</div>';

  // 12 Monate im Grid
  html+='<div class="jk-grid">';
  for(var moi=0;moi<12;moi++){
    // erster Wochentag des Monats (Mo=1..So=7)
    var firstDow=(new Date(year,moi,1).getDay())||7;
    var monStart=new Date(year,moi,1-(firstDow-1));
    html+='<div class="jk-month">';
    html+='<div class="jk-mtitle">'+MNAMES[moi]+'</div>';
    html+='<div class="jk-drow">';
    for(var di=0;di<7;di++){html+='<div class="jk-dn'+(di>=5?' we':'')+'">'+DNAMES[di]+'</div>';}
    html+='</div>';
    for(var ww=0;ww<6;ww++){
      var wS=new Date(monStart);wS.setDate(monStart.getDate()+ww*7);
      if(ww>0&&wS.getMonth()>moi&&wS.getFullYear()===year)break;
      if(ww>0&&wS.getFullYear()>year)break;
      html+='<div class="jk-drow">';
      for(var dd=0;dd<7;dd++){
        var cd=new Date(wS);cd.setDate(wS.getDate()+dd);
        var cdiso=dISO(cd);
        var inM=cd.getMonth()===moi&&cd.getFullYear()===year;
        var isWE=dd>=5;
        if(!inM){html+='<div class="jk-day out"></div>';continue;}
        var ft=FEIERTAGE[cdiso];
        // Absence for this person on that day
        var ab=maE.filter(function(e){return e.gen!=='Nein'&&e.von<=cdiso&&(e.bis||e.von)>=cdiso;})[0];
        var cls='jk-day', lbl=cd.getDate(), title=fmtD(cdiso);
        if(ft){cls+=' ft';title+=' – '+ft;}
        else if(ab){
          if(ab.art==='Urlaub'){cls+=ab.gen==='Ja'?' url':' urlp';}
          else if(ab.art==='Krank'){cls+=' krank';}
          else if(ab.art==='Bildungsurlaub'){cls+=' bild';}
          else if(ab.art==='Fortbildung'){cls+=' fort';}
          else if(ab.art==='Sonderurlaub'||ab.art==='Freistellung'){cls+=' son';}
          else if(ab.art==='Elternzeit'){cls+=' son';}
          else{cls+=' ab';}
          title+=' – '+ab.art+(ab.gen==='Ausstehend'?' (ausstehend)':'');
        } else if(isWE){cls+=' we';}
        if(cdiso===t)cls+=' today';
        html+='<div class="'+cls+'" title="'+title+'">'+lbl+'</div>';
      }
      html+='</div>';
    }
    // Feiertagsliste dieses Monats
    var ftList=Object.keys(FEIERTAGE).filter(function(d){return d.startsWith(year+'-'+z(moi+1));});
    if(ftList.length){
      html+='<div class="jk-ft">';
      ftList.forEach(function(d){html+='● '+FEIERTAGE[d]+'<br>';});
      html+='</div>';
    }
    html+='</div>';
  }
  html+='</div>';

  // Zusammenfassung: Zähler pro Art im gewählten Jahr
  var counts={};
  maE.forEach(function(e){
    if(!e.von||e.von.slice(0,4)!==String(year))return;
    if(e.gen==='Nein')return;
    counts[e.art]=(counts[e.art]||0)+((+e.tage)||0);
  });
  html+='<div style="margin-top:12px;padding-top:10px;border-top:1px solid #f0f0ee;font-size:11px;color:#555;display:flex;gap:14px;flex-wrap:wrap">';
  html+='<strong style="color:'+NAVY+'">Summen '+year+':</strong>';
  var artOrder=['Urlaub','Krank','Bildungsurlaub','Fortbildung','Sonderurlaub','Freistellung','Abwesenheit','Elternzeit','Sonstiges'];
  var any=false;
  artOrder.forEach(function(a){if(counts[a]){any=true;html+='<span><span class="badge" style="'+artStyle(a)+'">'+a+'</span> '+counts[a]+' T</span>';}});
  if(!any)html+='<span style="color:#aaa">Keine Einträge in '+year+'</span>';
  html+='</div>';

  // Legende
  html+='<div style="margin-top:10px;font-size:10px;color:#888;display:flex;gap:10px;flex-wrap:wrap">';
  html+='<span><span class="jk-key url"></span> Urlaub genehmigt</span>';
  html+='<span><span class="jk-key urlp"></span> Urlaub ausstehend</span>';
  html+='<span><span class="jk-key krank"></span> Krank</span>';
  html+='<span><span class="jk-key bild"></span> Bildungsurlaub</span>';
  html+='<span><span class="jk-key fort"></span> Fortbildung</span>';
  html+='<span><span class="jk-key son"></span> Sonder-/Freistellung</span>';
  html+='<span><span class="jk-key ft"></span> Feiertag</span>';
  html+='<span><span class="jk-key we"></span> Wochenende</span>';
  html+='</div>';
  html+='</div>';
  return html;
}

// Sortiert eine Kopie der Einträge nach dem gewählten Modus.
// "Erfassung" nutzt die Eintrag-ID (E-0001, E-0002, …), da diese die Reihenfolge
// widerspiegelt, in der die Einträge angelegt wurden.
function idNum(id){var m=/(\d+)/.exec(id||'');return m?parseInt(m[1],10):0;}
function sortEntries(entries,mode){
  var arr=entries.slice();
  switch(mode){
    case 'von_asc': arr.sort(function(a,b){return a.von.localeCompare(b.von);}); break;
    case 'name_asc': arr.sort(function(a,b){return maName(a.ma).localeCompare(maName(b.ma),'de')||a.von.localeCompare(b.von);}); break;
    case 'name_desc': arr.sort(function(a,b){return maName(b.ma).localeCompare(maName(a.ma),'de')||b.von.localeCompare(a.von);}); break;
    case 'erfassung_asc': arr.sort(function(a,b){return idNum(a.id)-idNum(b.id);}); break;
    case 'erfassung_desc': arr.sort(function(a,b){return idNum(b.id)-idNum(a.id);}); break;
    case 'von_desc': default: arr.sort(function(a,b){return b.von.localeCompare(a.von);}); break;
  }
  return arr;
}
function setSort(mode){D.sortMode=mode;renderContent();}

function ufSet(key,val){
  D.uf[key]=val;
  if(key==='von'&&(!D.uf.bis||D.uf.bis<val))D.uf.bis=val;
  renderContent();
}
function esc(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function saveEntry(){
  var uf=D.uf;
  if(!uf.ma){flash('Bitte MA_ID auswählen.','err');return;}
  if(!uf.von){flash('Bitte Von-Datum angeben.','err');return;}
  var tage=netDays(uf.von,uf.bis||uf.von);
  var brauchtGen=ART_GEN.indexOf(uf.art)>=0;
  var gen=brauchtGen?uf.gen:'–';
  if(D.editId){
    var idx=D.entries.findIndex(function(e){return e.id===D.editId;});
    if(idx>-1){
      var prev=D.entries[idx];
      D.entries[idx]={id:D.editId,ma:uf.ma,art:uf.art,von:uf.von,bis:uf.bis||uf.von,tage:tage,gen:gen,kom:uf.kom,erfasstAm:prev.erfasstAm||''};
    }
    flash('Eintrag '+D.editId+' aktualisiert ✓','ok');
    D.editId=null;
  } else {
    var id=newId();
    D.entries.push({id:id,ma:uf.ma,art:uf.art,von:uf.von,bis:uf.bis||uf.von,tage:tage,gen:gen,kom:uf.kom,erfasstAm:new Date().toISOString()});
    flash('Gespeichert · '+id+' ('+tage+' Arbeitstage)','ok');
  }
  D.uf={ma:uf.ma,art:uf.art,von:'',bis:'',gen:'Ausstehend',kom:''};
  dbSave();
  renderNav();
  renderContent();
}

function editEntry(id){
  var e=D.entries.find(function(x){return x.id===id;});
  if(!e)return;
  D.uf={ma:e.ma,art:e.art,von:e.von,bis:e.bis,gen:e.gen,kom:e.kom||''};
  D.editId=id;
  G.view('eingabe');
}
function cancelEdit(){D.editId=null;D.uf={ma:'',art:'Urlaub',von:'',bis:'',gen:'Ausstehend',kom:''};renderContent();}

function delEntry(id){
  if(!confirm('Eintrag '+id+' löschen?'))return;
  D.entries=D.entries.filter(function(e){return e.id!==id;});
  flash('Eintrag '+id+' gelöscht');
  dbSave();renderNav();renderContent();
}

function approve(id){
  var e=D.entries.find(function(x){return x.id===id;});
  if(e){e.gen='Ja';dbSave();flash('Genehmigt: '+id,'ok');renderNav();renderContent();}
}
function deny(id){
  var e=D.entries.find(function(x){return x.id===id;});
  if(e){e.gen='Nein';dbSave();flash('Abgelehnt: '+id);renderNav();renderContent();}
}
function clearAll(){D.entries=[];D.nid=1;dbSave();flash('Alle Einträge gelöscht');renderNav();renderContent();}

// Historische Daten (SEED) manuell (nach)laden – hängt Einträge an, überspringt Duplikate anhand id/ma/von/art
function loadSeed(){
  if(!Array.isArray(SEED)||SEED.length===0){flash('Keine SEED-Daten vorhanden','err');return;}
  var have={};
  D.entries.forEach(function(e){have[e.ma+'|'+e.von+'|'+e.bis+'|'+e.art]=true;});
  var maxId=D.entries.reduce(function(m,e){return Math.max(m,idNum(e.id));},0);
  var added=0,skipped=0;
  SEED.forEach(function(s){
    var k=s.ma+'|'+s.von+'|'+s.bis+'|'+s.art;
    if(have[k]){skipped++;return;}
    maxId++;
    D.entries.push({id:'E-'+String(maxId).padStart(4,'0'),ma:s.ma,art:s.art,von:s.von,bis:s.bis,tage:s.tage,gen:s.gen,kom:s.kom});
    have[k]=true; added++;
  });
  D.nid=Math.max(D.nid,maxId+1);
  dbSave();
  flash('Historische Daten geladen: '+added+' neu, '+skipped+' übersprungen','ok');
  renderNav();renderContent();
}
