*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1A2E5A;--blue:#0C447C;--accent:#E5820A;--ok:#085041;--warn:#633806;--err:#791F1F;

body{font-family:var(--font);background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh;-webkit-tap-highlight-color:transparent}

/* LOGIN */
#login{position:fixed;inset:0;z-index:9999;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-direction:column}
#login-box{background:#fff;border-radius:14px;padding:36px 32px;width:320px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.45)}
#ms-btn{width:100%;padding:11px;font-size:14px;font-weight:600;border:none;border-radius:8px;

#ms-btn:hover{background:#006CBE}
#ms-btn svg{width:20px;height:20px;flex-shrink:0}
#lerr{color:#E24B4A;font-size:12px;margin-top:10px;min-height:18px}
.login-hint{font-size:11px;color:#aaa;margin-top:14px;line-height:1.5}
.offline-link{font-size:11px;color:#B5D4F4;margin-top:10px;cursor:pointer;text-decoration:underline}

/* APP */
#app{max-width:1080px;margin:0 auto;padding:14px;padding-bottom:80px;display:none}
.hdr{background:var(--navy);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-radius:8px 8px 0 0;flex-wrap:wrap;gap:6px}
.hdr-l{color:#fff;font-weight:500;font-size:14px}
.hdr-l em{opacity:.55;font-size:11px;margin-left:8px;font-style:normal}
.hdr-r{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.hbtn{font-size:11px;padding:4px 10px;border-radius:5px;background:rgba(255,255,255,.12);color:#B5D4F4;border:1px solid rgba(255,255,255,.2);cursor:pointer;font-family:inherit}
.hbtn:hover{background:rgba(255,255,255,.2)}
.hr-badge{font-size:10px;background:var(--accent);color:#fff;padding:3px 8px;border-radius:10px;font-weight:500}
.sync-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:5px;background:rgba(255,255,255,.1);color:#B5D4F4;white-space:nowrap}
.sync-dot.ok{background:rgba(8,80,65,.5);color:#9FE1CB}
.sync-dot.err{background:rgba(121,31,31,.5);color:#F8A3A3}
.sync-dot.spin{background:rgba(12,68,124,.4);color:#B5D4F4}
.sync-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor;display:block;flex-shrink:0}
.sync-dot.spin::before{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.user-chip{font-size:11px;color:rgba(181,212,244,.7);white-space:nowrap}

/* NAV */
.nav-bar{background:var(--bg);border:1px solid var(--bdr);border-top:none;display:flex;overflow-x:auto;scrollbar-width:none}
.nav-bar::-webkit-scrollbar{display:none}

.ntab:hover{background:#f0f0ee}
.nbadge{background:#E24B4A;color:#fff;border-radius:9px;padding:1px 5px;font-size:9px;margin-left:3px}

/* CONTENT */

.toast{padding:7px 14px;font-size:12px;border-radius:5px;margin-bottom:12px;display:none}

.toast.ok{background:var(--ok-bg);border:1px solid #9FE1CB;color:var(--ok)}
.toast.warn{background:var(--warn-bg);border:1px solid #EF9F27;color:var(--warn)}
.toast.err{background:var(--err-bg);border:1px solid #F09595;color:var(--err)}

<script>
// ═══════════════════════════════════════════════════════
//  AZURE / GRAPH KONFIGURATION
// ═══════════════════════════════════════════════════════
var CFG = {
  clientId:    '63430439-3fc0-464c-bc98-e4ebe59dbd73',
  tenantId:    'ac04c9b0-c539-4946-9abd-5366742dfd87',
  redirectUri: 'https://geteq-berlin.github.io/abwesenheiten/GETEQ_Dashboard_2026.html',
  site:        'geteq.sharepoint.com:/sites/GETEQAbwesenheiten:',
  dataPath:    'Freigegebene Dokumente/Abwesenheiten/GETEQ_Daten.json',
  scopes:      ['Files.ReadWrite.All','Sites.ReadWrite.All','User.Read']
};

var msalInstance = null;
var currentUser  = null;
var cloudEnabled = false;
var saveDebounce = null;

// ─── MSAL INIT ────────────────────────────────────────
function initMSAL() {
  if (typeof msal === 'undefined') {
    document.getElementById('lerr').textContent = 'Fehler: MSAL nicht geladen. Bitte F5 drücken.';
    return Promise.reject(new Error('MSAL not loaded'));
  }
  msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId:    CFG.clientId,
      authority:   'https://login.microsoftonline.com/' + CFG.tenantId,
      redirectUri: CFG.redirectUri
    },
    cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true }
  });
  return Promise.resolve();
}

async function doMSLogin() {
  var btn = document.getElementById('ms-btn');
  var err = document.getElementById('lerr');
  btn.disabled = true;
  btn.textContent = 'Anmelden …';
  err.textContent = '';
  try {
    await msalInstance.loginPopup({ scopes: CFG.scopes });
    var accounts = msalInstance.getAllAccounts();
    if (accounts.length === 0) throw new Error('Kein Konto gefunden');
    currentUser  = accounts[0];
    cloudEnabled = true;
    await bootApp();
  } catch(e) {
    err.textContent = 'Fehler: ' + (e.message||e);
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" fill="none" style="width:20px;height:20px"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>Mit Microsoft anmelden';
  }
}

function offlineMode() {
  cloudEnabled = false;
  currentUser  = null;
  bootApp();
}

async function silentLogin() {
  var accounts = msalInstance.getAllAccounts();
  if (accounts.length === 0) return false;
  currentUser = accounts[0];
  try {
    await msalInstance.acquireTokenSilent({ scopes: CFG.scopes, account: currentUser });
    cloudEnabled = true;
    return true;
  } catch(e) { return false; }
}

async function getToken() {
  if (!cloudEnabled || !currentUser) return null;
  try {
    var resp = await msalInstance.acquireTokenSilent({ scopes: CFG.scopes, account: currentUser });
    return resp.accessToken;
  } catch(e) {
    try {
      var resp2 = await msalInstance.acquireTokenPopup({ scopes: CFG.scopes });
      return resp2.accessToken;
    } catch(e2) { cloudEnabled = false; return null; }
  }
}

function doLogout() {
  if (cloudEnabled && msalInstance) {
    msalInstance.logoutPopup().then(function(){ location.reload(); }).catch(function(){ location.reload(); });
  } else { location.reload(); }
}

// ═══════════════════════════════════════════════════════
//  GRAPH API – CLOUD SYNC
// ═══════════════════════════════════════════════════════
var GRAPH = 'https://graph.microsoft.com/v1.0';

async function cloudLoad() {
  var token = await getToken();
  if (!token) return null;
  var url = GRAPH+'/sites/'+CFG.site+'/drive/root:/'+CFG.dataPath+':/content';
  try {
    var res = await fetch(url, { headers: { Authorization: 'Bearer '+token } });
    if (res.status === 404) return null;  // Datei existiert noch nicht
    if (!res.ok) throw new Error('HTTP '+res.status);
    return await res.json();
  } catch(e) {
    console.warn('Cloud load error:', e);
    return null;
  }
}

async function cloudSave(data) {
  var token = await getToken();
  if (!token) { setSyncStatus('err','⚠ Kein Token'); return false; }
  var url = GRAPH+'/sites/'+CFG.site+'/drive/root:/'+CFG.dataPath+':/content';
  try {
    setSyncStatus('spin','Speichern …');
    var res = await fetch(url, {
      method: 'PUT',
      headers: { Authorization: 'Bearer '+token, 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    setSyncStatus('ok','☁ Cloud gespeichert');
    return true;
  } catch(e) {
    setSyncStatus('err','⚠ Cloud-Fehler: '+e.message);
    return false;
  }
}

// Merge-Logik: lokale und Cloud-Daten zusammenführen
function mergeData(local, cloud) {
  if (!cloud) return local;
  if (!local || !local.entries || local.entries.length === 0) return cloud;
  // Cloud-Einträge als Map
  var cloudMap = {};
  (cloud.entries||[]).forEach(function(e){ cloudMap[e.id]=e; });
  // Lokale Einträge die NICHT in Cloud sind → hinzufügen
  var merged = (cloud.entries||[]).slice();
  (local.entries||[]).forEach(function(e){
    if (!cloudMap[e.id]) merged.push(e);
  });
  return {
    entries: merged,
    nid: Math.max(local.nid||1, cloud.nid||1),
    meta: cloud.meta,
    ts: new Date().toISOString()
  };
}

function triggerSave() {
  clearTimeout(saveDebounce);
  saveDebounce = setTimeout(async function(){
    var payload = { entries: D.entries, nid: D.nid, ts: new Date().toISOString() };
    // Immer lokal speichern
    try { localStorage.setItem('geteq-ab-2026-v2', JSON.stringify(payload)); } catch(e) {}
    // Cloud wenn verfügbar
    if (cloudEnabled) {
      await cloudSave(payload);
    } else {
      setSyncStatus('err','Offline – nur lokal');
    }
  }, 1200);
}

function setSyncStatus(type, txt) {
  var el = document.getElementById('sync-status');
  if (!el) return;
  el.className = 'sync-dot ' + (type||'');
  el.textContent = txt;
  if (type === 'ok') {
    clearTimeout(setSyncStatus._t);
    setSyncStatus._t = setTimeout(function(){
      if (el) { el.className='sync-dot'; el.textContent=cloudEnabled?'☁ Verbunden':'Offline'; }
    }, 3000);
  }
}

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
async function bootApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display   = 'block';

  setSyncStatus('spin','Lade Daten …');

  // 1. Lokalen Cache laden
  var local = null;
  try {
    var raw = localStorage.getItem('geteq-ab-2026-v2');
    if (raw) local = JSON.parse(raw);
  } catch(e) {}

  // 2. Cloud laden wenn verfügbar
  var cloud = null;
  if (cloudEnabled) {
    cloud = await cloudLoad();
  }

  // 3. Mergen
  var merged = mergeData(local, cloud);
  if (merged) {
    D.entries = merged.entries || [];
    D.nid     = merged.nid || 1;
  }

  // 4. Falls Cloud-Stand neuer als lokal → lokal aktualisieren
  if (cloud) {
    try { localStorage.setItem('geteq-ab-2026-v2', JSON.stringify({entries:D.entries,nid:D.nid,ts:new Date().toISOString()})); } catch(e) {}
  }

  // HR via sessionStorage
  if (sessionStorage.getItem('geteq-hr')==='1') D.isHR = true;

  setSyncStatus(cloudEnabled?'ok':'err', cloudEnabled?'☁ Verbunden':'Offline');

  render();
}

// ═══════════════════════════════════════════════════════
//  HILFSFUNKTIONEN
// ═══════════════════════════════════════════════════════
function dISO(d){return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
function z(n){return String(n).padStart(2,'0');}
function today(){return dISO(new Date());}
function fmtD(s){if(!s)return'–';var p=s.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function isoWeek(d){var dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var dn=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-dn);var y0=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil(((dt-y0)/864e5+1)/7);}
function weekDays(d){var day=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));var r=[];for(var i=0;i<5;i++){var x=new Date(mon);x.setDate(mon.getDate()+i);r.push(x);}return r;}
function netDays(a,b){if(!a||!b)return 0;var s=new Date(a),e=new Date(b),n=0,d=new Date(s);if(s>e)return 0;while(d<=e){var ds=dISO(d);if(d.getDay()>0&&d.getDay()<6&&!FEIERTAGE[ds])n++;d.setDate(d.getDate()+1);}return n;}
function getMa(id){return STAMM.find(function(m){return m.id===id;})||{f:'–',c:'–',ju:0,b:0,ue:0};}
function artStyle(art){if(art==='Urlaub')return 'background:#E6F1FB;color:#0C447C';if(art==='Bildungsurlaub')return 'background:#D1FAE5;color:#065F46';if(art==='Abwesenheit')return 'background:#FAEEDA;color:#633806';if(art==='Fortbildung')return 'background:#FAECE7;color:#712B13';if(art==='Sonderurlaub')return 'background:#EEEDFE;color:#3C3489';if(art==='Freistellung')return 'background:#FBEAF0;color:#72243E';return 'background:#f1efe8;color:#5f5e5a';}
function artClass(art){if(art==='Urlaub')return 'wk-url';if(art==='Abwesenheit')return 'wk-ab';if(art==='Fortbildung')return 'wk-fort';if(art==='Sonderurlaub'||art==='Freistellung')return 'wk-son';if(art==='Bildungsurlaub')return 'wk-bild';return 'wk-son';}
function genStyle(g){if(g==='Ja')return 'background:#EAF3DE;color:#085041';if(g==='Nein')return 'background:#FCEBEB;color:#791F1F';return 'background:#f1efe8;color:#888';}

// ═══════════════════════════════════════════════════════
//  NAVIGATION & RENDER
// ═══════════════════════════════════════════════════════
var VIEWS=[['uebersicht','⌂ Übersicht'],['woche','📅 Wochenkalender'],['konto','☀ Urlaubskonto'],['eingabe','+ Neue Meldung'],['einst','⚙ Einstellungen']];

var G={
  view:function(name){D.view=name;renderNav();renderContent();window.scrollTo({top:0,behavior:'smooth'});},
  weekOff:function(n){D.weekOff=n;renderContent();}
};

function flash(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'ok');clearTimeout(flash._t);flash._t=setTimeout(function(){t.className='toast';},2800);}
function render(){renderHeader();renderNav();renderContent();}

function renderHeader(){
  var d=new Date().toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
  var userName = currentUser ? currentUser.name||currentUser.username : 'Offline';
  document.getElementById('hdr-wrap').innerHTML=
    '<div class="hdr">'+
    '<div class="hdr-l">GETEQ <em>Abwesenheitsmanagement 2026</em></div>'+
    '<div class="hdr-r">'+

}

function renderNav(){
  var offen=D.entries.filter(function(e){return e.gen==='Ausstehend';}).length;
  var html='<div class="nav-bar">';
  VIEWS.forEach(function(v){
    var act=D.view===v[0];
    html+='<button class="ntab'+(act?' on':'')+'" onclick="G.view(\''+v[0]+'\')">'+v[1];
    if(v[0]==='eingabe'&&offen>0)html+='<span class="nbadge">'+offen+'</span>';
    html+='</button>';
  });
  html+='</div>';
  document.getElementById('nav-bar').outerHTML=html;
}

function renderContent(){
  var t=today(),entries=D.entries;
  var html='';
  if(D.view==='uebersicht')html=viewUebersicht(entries,t);
  else if(D.view==='woche')html=viewWoche(entries,t);
  else if(D.view==='konto')html=viewKonto(entries,t);
  else if(D.view==='eingabe')html=viewEingabe(entries,t);
  else if(D.view==='einst')html=viewEinstellungen(entries);
  document.getElementById('content').innerHTML=html;
}

function viewUebersicht(entries,t){

  var html='';
  if(D.isHR&&offen.length>0){
    html+='<div style="background:#EAF3DE;border:1px solid #9FE1CB;border-radius:8px;padding:10px 12px;margin-bottom:12px">';
    html+='<div style="font-size:12px;font-weight:500;color:#085041;margin-bottom:8px">⏳ Offene Genehmigungen ('+offen.length+')</div>';
    offen.forEach(function(e){
      html+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(159,225,203,.5);flex-wrap:wrap">';
      html+='<span style="flex:1;font-size:12px"><strong>'+e.ma+'</strong> · '+getMa(e.ma).f+' · '+fmtD(e.von)+(e.bis&&e.bis!==e.von?' – '+fmtD(e.bis):'')+' · '+e.tage+' Tage</span>';
      html+='<button class="btn btn-ok btn-sm" onclick="approve(\''+e.id+'\')">Genehmigen</button>';
      html+='<button class="btn btn-err btn-sm" onclick="deny(\''+e.id+'\')">Ablehnen</button>';
      html+='</div>';
    });
    html+='</div>';
  }
  html+='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">';
  [{l:'Heute abwesend',v:abwH.length,sub:abwH.length?abwH.slice(0,3).map(function(e){return e.ma;}).join(', '):'–',c:abwH.length?'#0C447C':undefined},
   {l:'Offene Anträge',v:offen.length,sub:'ausstehend',c:offen.length?'#633806':undefined},
   {l:'Einträge gesamt',v:entries.length,sub:STAMM.filter(function(m){return m.on;}).length+' MA aktiv'}
  ].forEach(function(x){
    html+='<div class="stat"><div style="font-size:11px;color:#888;margin-bottom:3px">'+x.l+'</div>';
    html+='<div style="font-size:22px;font-weight:500;line-height:1.1;color:'+(x.c||'#1a1a1a')+'">'+x.v+'</div>';
    html+='<div style="font-size:11px;color:#aaa;margin-top:3px">'+x.sub+'</div></div>';
  });
  html+='</div>';
  html+=wochenplanHTML(entries,wkD,wkStart,wkEnd,t,true);
  var soon=entries.filter(function(e){return e.gen!=='Nein'&&e.von>t;}).sort(function(a,b){return a.von.localeCompare(b.von);}).slice(0,10);
  if(soon.length){
    html+='<div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin:14px 0 8px">Nächste Abwesenheiten</div>';
    html+='<table><thead><tr><th>MA_ID</th><th>Funktion</th><th>Art</th><th>Von</th><th>Bis</th><th>Tage</th><th>Status</th></tr></thead><tbody>';
    soon.forEach(function(e){var ma=getMa(e.ma);html+='<tr><td><strong>'+e.ma+'</strong></td><td style="color:#555">'+ma.f+'</td><td><span class="badge" style="'+artStyle(e.art)+'">'+e.art+'</span></td><td>'+fmtD(e.von)+'</td><td>'+fmtD(e.bis||e.von)+'</td><td>'+e.tage+'</td><td><span class="badge" style="'+genStyle(e.gen)+'">'+e.gen+'</span></td></tr>';});
    html+='</tbody></table>';
  }
  return html;
}

function wochenplanHTML(entries,wkD,wkStart,wkEnd,t,compact){
  var kw=isoWeek(wkD[0]);var DE=['Mo','Di','Mi','Do','Fr'];
  var cols='120px repeat(5,1fr)';
  var wkMAs=STAMM.filter(function(ma){return ma.on&&wkD.some(function(d){var ds=dISO(d);return entries.some(function(e){return e.ma===ma.id&&e.gen!=='Nein'&&e.von<=ds&&(e.bis||e.von)>=ds;});});});
  var html='<div class="wk-outer"><div class="wk-nav">';
  html+='<button onclick="G.weekOff('+(D.weekOff-1)+')">← Vorwoche</button>';
  html+='<span style="font-size:12px;font-weight:600;color:'+NAVY+'">KW '+kw+'</span>';
  html+='<span style="font-size:11px;color:#888">'+fmtD(wkStart)+' – '+fmtD(wkEnd)+'</span>';
  html+='<button onclick="G.weekOff('+(D.weekOff+1)+')">Folgewoche →</button></div>';
  html+='<div style="display:grid;grid-template-columns:'+cols+';gap:2px;margin-bottom:4px"><div></div>';
  wkD.forEach(function(d,i){var ds=dISO(d);var isT=ds===t;var isFt=!!FEIERTAGE[ds];html+='<div class="wk-head'+(isT?' today':'')+'">';html+=DE[i]+'<br><span style="font-size:9px;font-weight:400;color:'+(isFt?'#aaa':'inherit')+'">'+fmtD(ds)+(isFt?'*':'')+'</span></div>';});
  html+='</div>';
  if(wkMAs.length===0){html+='<div style="text-align:center;color:#aaa;padding:20px;font-size:12px">✅ Alle anwesend diese Woche</div>';}
  else{wkMAs.forEach(function(ma){html+='<div style="display:grid;grid-template-columns:'+cols+';gap:2px;margin-bottom:2px"><div class="wk-name"><span>'+ma.id+'</span><span style="font-size:9px;color:#aaa;font-weight:400">'+ma.c+'</span></div>';wkD.forEach(function(d){var ds=dISO(d);var isFt=!!FEIERTAGE[ds];if(isFt){html+='<div class="wk-cell wk-holiday" title="'+FEIERTAGE[ds]+'">FT</div>';return;}var abs=entries.filter(function(e){return e.ma===ma.id&&e.gen!=='Nein'&&e.von<=ds&&(e.bis||e.von)>=ds;});if(abs.length===0){html+='<div class="wk-cell wk-empty'+(ds===t?' today':'')+'" title="Anwesend"></div>';}else{var e=abs[0];html+='<div class="wk-cell '+artClass(e.art)+'" title="'+e.art+' · '+e.tage+'d">'+e.art.slice(0,2)+'</div>';}});html+='</div>';});}
  html+='<div class="wk-legend">';
  [['wk-url','Urlaub'],['wk-bild','Bildungsurlaub'],['wk-fort','Fortbildung'],['wk-ab','Abwesenheit'],['wk-son','Sonderurlaub/Freistellung'],['wk-holiday','Feiertag']].forEach(function(l){html+='<span><span class="badge wk-pill '+l[0]+'">'+l[1].slice(0,2)+'</span> '+l[1]+'</span>';});
  html+='</div></div>';
  return html;
}

function viewWoche(entries,t){var baseD=new Date(Date.now()+D.weekOff*604800000);var wkD=weekDays(baseD);return wochenplanHTML(entries,wkD,dISO(wkD[0]),dISO(wkD[4]),t,false);}

function viewKonto(entries,t){
  var html='<div style="overflow-x:auto"><table><thead><tr><th>MA_ID</th><th>Code</th><th>Funktion</th><th style="text-align:center">Anspruch</th><th style="text-align:center">Grundansp.</th><th style="text-align:center">Übert. VJ</th><th style="text-align:center">Genommen</th><th style="text-align:center">Geplant</th><th style="text-align:center">Rest</th><th style="min-width:90px">Fortschritt</th></tr></thead><tbody>';
  var totA=0,totG=0,totP=0;
  STAMM.filter(function(m){return m.on&&m.ju>0;}).forEach(function(ma){
    var ue=ma.ue||0;var allUrl=entries.filter(function(e){return e.ma===ma.id&&e.art==='Urlaub'&&e.gen==='Ja';});
    var genT=allUrl.filter(function(e){return e.von<=t;}).reduce(function(s,e){return s+((+e.tage)||0);},0);
    var planT=allUrl.filter(function(e){return e.von>t;}).reduce(function(s,e){return s+((+e.tage)||0);},0);
    var rest=ma.ju-genT;var pct=ma.ju>0?Math.min(110,Math.round((genT+planT)/ma.ju*100)):0;var pctG=ma.ju>0?Math.min(100,Math.round(genT/ma.ju*100)):0;
    var restC=rest<0?'#791F1F':rest<5?'#B45309':'#1a1a1a';
    totA+=ma.ju;totG+=genT;totP+=planT;
    html+='<tr'+(rest<0?' style="background:#FFF0F0"':ue>0?' style="background:#FFFBE6"':'')+'>'; 
    html+='<td><strong>'+ma.id+'</strong></td><td><span class="badge" style="background:#f1efe8;color:#5f5e5a">'+ma.c+'</span></td><td style="font-size:11px;color:#555">'+ma.f+'</td>';
    html+='<td style="text-align:center;font-weight:600">'+ma.ju+'</td><td style="text-align:center;color:#555">'+ma.b+'</td><td style="text-align:center;font-weight:'+(ue>0?'600':'400')+';color:'+(ue>0?'#085041':'#ccc')+'">'+ue+'</td>';
    html+='<td style="text-align:center;font-weight:500;color:#0C447C">'+(genT||'—')+'</td><td style="text-align:center;color:#888">'+(planT||'—')+'</td>';
    html+='<td style="text-align:center;font-weight:600;color:'+restC+'">'+rest+'</td>';
    html+='<td><div style="position:relative;height:8px;background:#f0f0ee;border-radius:4px;overflow:hidden;min-width:80px"><div style="position:absolute;left:0;top:0;height:100%;width:'+Math.min(100,pct)+'%;background:#B5D4F4;border-radius:4px"></div><div style="position:absolute;left:0;top:0;height:100%;width:'+pctG+'%;background:'+NAVY+';border-radius:4px"></div></div><div style="font-size:9px;color:#aaa;text-align:right;margin-top:1px">'+pctG+'%</div></td></tr>';
  });
  html+='<tr style="background:#f5f5f3;font-weight:600"><td colspan="3">Summe</td><td style="text-align:center">'+totA+'T</td><td></td><td></td><td style="text-align:center;color:#0C447C">'+totG+'T</td><td style="text-align:center;color:#888">'+totP+'T</td><td style="text-align:center">'+(totA-totG)+'T</td><td></td></tr>';
  html+='</tbody></table></div><div style="font-size:10px;color:#aaa;margin-top:8px;display:flex;gap:14px;flex-wrap:wrap"><span>■ <span style="color:'+NAVY+'">Genommen</span></span><span>■ <span style="color:#B5D4F4">Geplant</span></span><span style="background:#FFF0F0;padding:1px 4px;border-radius:3px">⚠ Rot = Überschritten</span><span>Stand: '+fmtD(t)+' · Feiertage abgezogen</span></div>';
  return html;
}

  if(entries.length>15)html+='<div style="font-size:10px;color:#aaa;margin-top:4px">+'+( entries.length-15)+' weitere</div>';}

function viewEinstellungen(entries){
  var html='<div style="display:flex;gap:14px;flex-wrap:wrap"><div class="card" style="flex:1;min-width:260px">';
  html+='<div style="font-size:12px;font-weight:600;color:#555;margin-bottom:10px">☁ Cloud-Sync Status</div>';
  html+='<div style="background:#f5f5f3;border-radius:6px;padding:10px 12px;font-size:12px;margin-bottom:12px;line-height:2">';
  html+='<div>Modus: <strong style="color:'+(cloudEnabled?'#085041':'#791F1F')+'">'+(cloudEnabled?'☁ Microsoft Cloud (SharePoint)':'⚠ Offline / lokal')+'</strong></div>';
  html+='<div>Nutzer: <strong>'+(currentUser?currentUser.name||currentUser.username:'nicht angemeldet')+'</strong></div>';
  html+='<div>Datei: <code style="font-size:10px">'+CFG.dataPath+'</code></div>';
  html+='<div>Einträge: <strong>'+entries.length+'</strong></div></div>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px"><button class="btn btn-p btn-sm" onclick="forceSyncNow()">☁ Jetzt synchronisieren</button><button class="btn btn-sm" onclick="exportJSON()">↓ JSON exportieren</button><button class="btn btn-sm" onclick="document.getElementById(\'imp\').click()">↑ JSON importieren</button><input type="file" id="imp" accept=".json" style="display:none" onchange="doImportFile(this)"></div>';
  html+='<hr style="border:none;border-top:1px solid #e2e8f0;margin:10px 0"><div style="font-size:12px;font-weight:600;color:#555;margin-bottom:8px">📱 Teams / Android</div>';
  html+='<ol style="font-size:12px;padding-left:16px;line-height:2;color:#555"><li>Dashboard über Teams-Tab öffnen</li><li>Einmalig Microsoft-Login – danach automatisch</li><li>Alle Änderungen werden sofort in SharePoint gespeichert</li><li>Alle drei Nutzenden sehen immer den aktuellen Stand</li></ol></div>';
  if(D.isHR){
    html+='<div class="card" style="border-color:#E24B4A;min-width:200px;flex:0 0 auto"><div style="font-size:12px;font-weight:600;color:#A32D2D;margin-bottom:10px">⚠ HR-Aktionen</div><button class="btn btn-sm" onclick="if(confirm(\'Alle Einträge löschen?\'))clearAll()">Alle Einträge löschen</button><div style="font-size:11px;color:#aaa;margin-top:6px">Stammdaten bleiben erhalten.</div><hr style="border:none;border-top:1px solid #e2e8f0;margin:10px 0"><button class="btn btn-sm" onclick="hrLock()">HR-Modus beenden</button></div>';
  }
  html+='</div>';
  return html;
}

// ═══════════════════════════════════════════════════════
//  ENTRY ACTIONS
// ═══════════════════════════════════════════════════════
function ufSet(key,val){D.uf[key]=val;if(key==='von'&&(!D.uf.bis||D.uf.bis<val))D.uf.bis=val;renderContent();}

function saveEntry(){
  var uf=D.uf;
  if(!uf.ma){flash('Bitte MA_ID auswählen.','err');return;}
  if(!uf.von){flash('Bitte Von-Datum angeben.','err');return;}
  var tage=netDays(uf.von,uf.bis||uf.von);
  var brauchtGen=ART_GEN.indexOf(uf.art)>=0;
  var gen=brauchtGen?uf.gen:'–';
  if(D.editId){
    var idx=D.entries.findIndex(function(e){return e.id===D.editId;});
    if(idx>-1)D.entries[idx]={id:D.editId,ma:uf.ma,art:uf.art,von:uf.von,bis:uf.bis||uf.von,tage:tage,gen:gen,kom:uf.kom};
    flash('Antrag '+D.editId+' aktualisiert ✓');D.editId=null;
  } else {
    var nums=D.entries.map(function(e){return parseInt((e.id||'').replace('E-',''))||0;});
    var id='E-'+String((nums.length?Math.max.apply(null,nums):0)+1).padStart(4,'0');
    D.entries.push({id:id,ma:uf.ma,art:uf.art,von:uf.von,bis:uf.bis||uf.von,tage:tage,gen:gen,kom:uf.kom||''});
    flash('Gespeichert · '+id+' ('+tage+' Arbeitstage)');
  }
  D.uf={ma:uf.ma,art:uf.art,von:'',bis:'',gen:'Ausstehend',kom:''};
  triggerSave();renderNav();renderContent();
}

function editEntry(id){var e=D.entries.find(function(x){return x.id===id;});if(!e)return;D.uf={ma:e.ma,art:e.art,von:e.von,bis:e.bis,gen:e.gen,kom:e.kom||''};D.editId=id;G.view('eingabe');}
function cancelEdit(){D.editId=null;D.uf={ma:'',art:'Urlaub',von:'',bis:'',gen:'Ausstehend',kom:''};renderContent();}
function delEntry(id){if(!confirm('Eintrag '+id+' löschen?'))return;D.entries=D.entries.filter(function(e){return e.id!==id;});flash('Eintrag '+id+' gelöscht');triggerSave();renderNav();renderContent();}
function approve(id){var e=D.entries.find(function(x){return x.id===id;});if(e){e.gen='Ja';triggerSave();flash('Genehmigt: '+id);renderNav();renderContent();}}
function deny(id){var e=D.entries.find(function(x){return x.id===id;});if(e){e.gen='Nein';triggerSave();flash('Abgelehnt: '+id);renderNav();renderContent();}}
function clearAll(){D.entries=[];triggerSave();flash('Alle Einträge gelöscht');renderNav();renderContent();}
function hrUnlock(){var v=prompt('HR-PIN:');if(v===PIN_HR){D.isHR=true;sessionStorage.setItem('geteq-hr','1');flash('HR-Modus aktiv');render();}else if(v!==null)flash('Falscher PIN','err');}
function hrLock(){D.isHR=false;sessionStorage.removeItem('geteq-hr');flash('HR-Modus deaktiviert');render();}

async function forceSyncNow(){
  setSyncStatus('spin','Synchronisiere …');
  var cloud=await cloudLoad();
  var local=D;
  var merged=mergeData({entries:D.entries,nid:D.nid},cloud);
  D.entries=merged.entries;D.nid=merged.nid;
  await cloudSave({entries:D.entries,nid:D.nid,ts:new Date().toISOString()});
  render();flash('Sync abgeschlossen ✓');
}

function exportJSON(){var json=JSON.stringify({entries:D.entries,nid:D.nid,ts:new Date().toISOString()},null,2);var blob=new Blob([json],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='GETEQ_Abwesenheiten_'+today()+'.json';a.click();URL.revokeObjectURL(url);flash('Export gestartet ✓');}
function doImportFile(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var p=JSON.parse(e.target.result);if(!Array.isArray(p.entries))throw new Error('Feld "entries" fehlt');D.entries=p.entries;D.nid=p.nid||D.nid;triggerSave();render();flash('Import: '+p.entries.length+' Einträge ✓');}catch(err){flash('Importfehler: '+err.message,'err');}};r.readAsText(f);inp.value='';}
function exportCSV(){var rows=[['ID','MA_ID','Funktion','Art','Von','Bis','Arbeitstage','Genehmigt','Kommentar']];D.entries.forEach(function(e){var ma=getMa(e.ma);rows.push([e.id,e.ma,ma.f,e.art,fmtD(e.von),fmtD(e.bis||e.von),e.tage,e.gen||'–',e.kom||'']);});var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(';');}).join('\n');var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='GETEQ_Abwesenheiten_'+today()+'.csv';a.click();URL.revokeObjectURL(url);flash('CSV-Export ✓');}

  // Versuche stillen Login
  var ok = await silentLogin();

  // sonst Login-Screen bleibt sichtbar
}).catch(function(e){
  console.error('MSAL init error:', e);
  var el = document.getElementById('lerr');
  if (el) el.textContent = 'Init-Fehler: ' + (e.message||e);
});
